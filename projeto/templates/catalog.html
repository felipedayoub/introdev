{% extends "base.html" %}
{% block content %}
<h2>Catálogo</h2>
<div>
{% for p in products %}
    <div>
        <p>{{ p.name }} - R$ {{ p.price }}</p>
        <img src="{{ p.file_name }}" alt="Imagem do item" width="300" height="200">
        <button id="button{{ p.name }}" hx-post="/cart" hx-vals='{"product_id": {{p.id}} }' hx-target="#button{{ p.name }}">
            Comprar
        </button>
    </div>
{% endfor %}
</div>
<div id="msg"></div>
<script>
document.body.addEventListener('htmx:afterRequest', function(evt) {
    if (evt.detail.xhr.responseText === 'NOT_LOGGED') {
        alert('Faça login primeiro!');
    }
});
</script>
{% endblock %}
