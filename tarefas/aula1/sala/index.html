<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Jupiterweb</title>
        <link rel="icon" href="https://uspdigital.usp.br/comumwebdev/imagens/favicon.ico"/>
        <link rel="stylesheet" href="style.css">
    </head>
    <body >
        
        <header> 
            <!-- Duas imagens de logo da USP (com link embutido) e um rodapé 
            para assemelhar ao site real do jupiterweb: -->
            <a href="https://www5.usp.br/">
                <img src="https://uspdigital.usp.br/comumwebdev/imagens/cabecalho/usp-logo.png" width="122" height="49" alt="" border="0" style="position: relative; top: -3px;"
                    alt="Logo USP">
            </a>
            <a href="https://www5.usp.br/">
                <img src="https://uspdigital.usp.br/comumwebdev/imagens/cabecalho/usp-logo-texto.png" alt="" width="260" height="44" border="0" style="position: relative; top: 5px;"
                    alt="Universidade de São Paulo - Brasil">
            </a>
            <div id="cabecalho"></div>
        </header>

        <main>
            <!--Formulário:-->
            <form>
                <p>
                    <!--Usuário-->
                    <label id="usuario" for="usuario">Usuário:</label>
                    <input type="text" name="usuario" id="usuario" required />
                </p>
                <p>
                    <!--Senha-->
                    <label for="senha">Senha:</label>
                    <input type="password" name="senha" id="senha" required />
                </p>
                <p>
                    <button>Entrar</button>
                </p>

            </form>            
        </main>



    <footer>
        <p>©Copyright 2050 by nobody. All rights reversed.</p>
      </footer>

    </body>

</html>
